name: Build Docker Images and Deploy

on:
  push:
    branches:
      - main


jobs:

  docker-build-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Build Backend Image
      run: |
         docker build -t madhvika/backend:latest ./crud-dd-task-mean-app/backend

    - name: Build Frontend Image
      run: |
        docker build -t madhvika/frontend:latest ./crud-dd-task-mean-app/frontend


    - name: Push Backend Image
      run: |
        docker push madhvika/backend:latest


    - name: Push Frontend Image
      run: |
        docker push madhvika/frontend:latest



  deploy-to-aws:

    needs: docker-build-push

    runs-on: ubuntu-latest


    steps:

    - name: Deploy on AWS VM
      uses: appleboy/ssh-action@v1.0.3

      with:

        host: ${{ secrets.SERVER_HOST }}

        username: ubuntu

        key: ${{ secrets.SERVER_SSH_KEY }}

        script: |

          cd /home/ubuntu/crud-dd-task-mean-app

          docker compose pull

          docker compose down

          docker compose up -d

services:

  mongo:
    image: mongo:latest
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  backend:
    image: madhvika/backend:latest
    container_name: backend..
    restart: always
    environment:
      MONGO_URI: mongodb://mongo:27017/cruddb
    depends_on:
      - mongo

  frontend:
    image: madhvika/frontend:latest
    container_name: frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend


volumes:
  mongo-data:

version: "3.8"

services:

  mongo:
    image: mongo:latest
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    image: madhvika/backend:latest
    container_name: backend
    restart: always
    ports:
      - "8081:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017/cruddb
    depends_on:
      - mongo

  frontend:
    image: madhvika/frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mongo-data:

name: CI-CD

on:
  push:
    branches:
      - main


jobs:

  build-push-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}


    - name: Set Image Tag
      run: |
        echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV


    # Backend image build
    - name: Build Backend Image
      run: |
        docker build --no-cache \
        -t madhvika/backend:${IMAGE_TAG} \
        -t madhvika/backend:latest \
        ./crud-dd-task-mean-app/backend


    # Frontend image build
    - name: Build Frontend Image
      run: |
        docker build --no-cache \
        -t madhvika/frontend:${IMAGE_TAG} \
        -t madhvika/frontend:latest \
        ./crud-dd-task-mean-app/frontend


    # Push images
    - name: Push Backend
      run: |
        docker push madhvika/backend:${IMAGE_TAG}
        docker push madhvika/backend:latest


    - name: Push Frontend
      run: |
        docker push madhvika/frontend:${IMAGE_TAG}
        docker push madhvika/frontend:latest



    # Deploy AWS
    - name: Deploy AWS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ubuntu
        key: ${{ secrets.AWS_KEY }}

        script: |

         cd /home/ubuntu/crud-dd-task-mean-app/crud-dd-task-mean-app

          docker-compose pull

          docker-compose down

          docker-compose up -d

          docker-compose up -d
